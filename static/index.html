<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业多知识库问答</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-shell">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo">📚 知识库</h1>
                <button id="logoutBtn" class="btn btn-outline btn-sm">退出</button>
            </div>
            <div class="sidebar-body">
                <h3 class="section-title">我的知识库</h3>
                <ul id="kbList" class="kb-list"></ul>
                <div class="kb-create">
                    <input type="text" id="newKbName" placeholder="新知识库名称" class="input">
                    <button id="createKbBtn" class="btn btn-primary btn-block">创建</button>
                </div>
            </div>
        </aside>

        <!-- 主工作区 -->
        <main class="main-content" id="workspace">
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">📖</div>
                <h2>选择一个知识库</h2>
                <p>从左侧列表选择一个知识库，或创建一个新的知识库开始</p>
            </div>
        </main>
    </div>

    <!-- 知识库详情模板（隐藏） -->
    <template id="kbDetailTemplate">
        <div class="kb-detail">
            <div class="kb-detail-header">
                <h2 class="kb-title"></h2>
                <div class="kb-actions">
                    <button class="btn btn-outline btn-sm" onclick="openAuthModal()">授权用户</button>
                    <button class="btn btn-outline btn-sm" id="evalBtn">📊 评测</button>
                    <button class="btn btn-danger btn-sm btn-delete-kb">删除知识库</button>
                </div>
            </div>
            <div class="kb-body">
                <!-- 文档管理区 -->
                <section class="doc-section">
                    <h3>📄 文档管理</h3>
                    <div class="upload-area" id="dropArea">
                        <input type="file" id="docFileInput" multiple accept=".pdf,.txt,.docx" hidden>
                        <div class="upload-zone" onclick="document.getElementById('docFileInput').click()">
                            <span class="upload-icon">📂</span>
                            <p>拖拽文件或点击此处上传</p>
                            <small>支持 PDF, TXT, DOCX (可多选)</small>
                        </div>
                    </div>
                    <button id="uploadDocBtn" class="btn btn-primary" style="margin-top:10px;">开始分析</button>
                    <div id="fileListPreview" class="file-preview" style="margin-top:10px;"></div>

                    <!-- 导入网页 -->
                    <div class="import-web-area" style="margin-top:20px; padding:16px; background:#f9fafb; border-radius:16px;">
                        <h4 style="margin-bottom:12px;">🌐 从网页导入</h4>
                        <div style="display:flex; gap:10px;">
                            <input type="text" id="webUrlInput" class="input" placeholder="输入网页URL，如 `https://example.com` " style="flex:1;">
                            <button id="importUrlBtn" class="btn btn-outline">导入</button>
                        </div>
                        <div id="importStatus" style="margin-top:8px; font-size:0.9rem;"></div>
                    </div>

                    <ul id="docList" class="doc-list"></ul>
                </section>

                <!-- 限定文档选择器 -->
                <div id="docSelector" class="doc-selector" style="display:none;">
                    <h4>📌 限定检索文档</h4>
                    <div id="docCheckboxes"></div>
                    <small style="color:#666;">不勾选则检索全部文档</small>
                </div>

                <!-- 问答区 -->
                <section class="chat-section">
                    <h3>💬 智能问答</h3>
                    <div id="chatBox" class="chat-messages">
                        <div class="chat-welcome">
                            <p>🤖 我已准备好回答关于知识库文档的问题</p>
                        </div>
                    </div>
                    <div class="chat-input-row">
                        <input type="text" id="questionInput" class="chat-input" placeholder="输入你的问题...">
                        <button id="askBtn" class="btn btn-primary">发送</button>
                    </div>
                    <div id="askLoading" class="loading-msg" style="display:none;">正在思考...</div>
                </section>
            </div>
        </div>
    </template>

    <!-- 授权弹窗（增强版） -->
    <div id="authModal" class="modal" style="display:none;">
        <div class="modal-content auth-modal-card">
            <span class="close" onclick="closeAuthModal()">&times;</span>
            <div class="auth-modal-header">
                <div class="auth-modal-icon">🔐</div>
                <h3>授权用户管理</h3>
                <p>管理知识库的访问权限</p>
            </div>
            <div class="auth-modal-body">
                <!-- 添加授权 -->
                <div class="input-group">
                    <span class="input-icon">👤</span>
                    <input type="text" id="authorizeUsername" placeholder="输入要授权的用户名" class="input">
                </div>
                <button onclick="authorizeUser()" class="btn btn-primary btn-block">确认授权</button>
                <div id="authMsg" style="margin-top:12px; font-size:0.9rem; text-align:center;"></div>

                <!-- 已授权用户列表 -->
                <div class="authorized-list-section" style="margin-top:20px;">
                    <h4 style="margin-bottom:12px; font-size:0.95rem; color:#34495e;">📋 已授权用户</h4>
                    <ul id="authorizedUserList" style="list-style:none; padding:0; max-height:150px; overflow-y:auto;"></ul>
                </div>
            </div>
        </div>
    </div>

    <!-- 评测模态框 -->
    <div id="evalModal" class="modal" style="display:none;">
        <div class="modal-content eval-modal-content" style="width:700px; max-height:85vh;">
            <div class="modal-header">
                <h3>📊 问答效果评测</h3>
                <span class="close" onclick="closeEvalModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div class="eval-upload">
                    <p>上传评测 JSON 文件（格式：[{"question":"...", "expected":"..."}]）</p>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                    <button type="button" class="btn btn-outline" onclick="document.getElementById('evalFileInput').click()">📂 选择文件</button>
                    <span id="evalFileName" style="flex:1; padding:10px; background:#f8fafc; border-radius:8px; font-size:0.9rem; color:#666;"></span>
                    <button id="startEvalBtn" class="btn btn-primary">🚀 开始评测</button>
                    </div>
                    <input type="file" id="evalFileInput" accept=".json" style="display:none;" onchange="document.getElementById('evalFileName').textContent = this.files[0]?.name || '未选择文件'">
                    <div id="evalStatus" style="margin-top:10px;"></div>
                </div>
                <div id="evalReport" style="display:none;">
                    <div id="evalSummary"></div>
                    <div id="evalTable"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/main.js"></script>
</body>
</html>
