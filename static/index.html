<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业文档智能问答助手</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📄 企业文档智能问答</h1>
            <p>上传 PDF / TXT / DOCX 文档，用自然语言提问，获取精准答案</p>
        </header>

        <!-- 文档管理区（折叠） -->
        <details class="card manage-section">
            <summary>📁 文档管理（点击展开）</summary>
            <div class="file-upload-area" id="dropArea">
                <input type="file" id="fileInput" multiple accept=".pdf,.txt,.docx" hidden>
                <div class="upload-icon">📂</div>
                <p>拖拽文件到此处或 <button type="button" class="link-btn" onclick="document.getElementById('fileInput').click()">选择文件</button></p>
                <p class="hint">支持 PDF, TXT, DOCX，可多选</p>
            </div>
            <div id="fileList" class="file-list"></div>
            <div class="actions">
                <button id="uploadBtn" class="btn btn-primary">🚀 上传并处理</button>
                <button id="resetBtn" class="btn btn-danger" onclick="resetKB()">⚠️ 清空知识库</button>
            </div>
            <div id="uploadStatus" class="status-message"></div>
            <div id="docList" class="doc-list"></div>
        </details>

        <!-- 文档选择器 -->
        <div id="docSelector" class="doc-selector card" style="display:none;">
            <h3>📌 限定检索文档</h3>
            <div id="docCheckboxes"></div>
            <small>不勾选则检索全部文档</small>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-container card">
            <div class="chat-messages" id="chatBox">
                <div class="message bot">
                    <div class="content">👋 你好！我已准备好回答关于上传文档的问题。</div>
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="questionInput" class="chat-input" placeholder="输入你的问题...">
                <button id="askBtn" class="btn btn-primary">发送</button>
            </div>
            <div id="loading" class="loading" style="display:none;">⏳ 正在思考...</div>
        </div>
    </div>
    <script src="/static/js/app.js"></script>
</body>
</html>
